name: Deploy Render API

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Python syntax
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m py_compile app/main.py app/routers/render.py app/services/svg_service.py

      - name: Upload app files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app,requirements.txt"
          target: /home/${{ secrets.VPS_USER }}/vdx-render-api/
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/vdx-render-api

            # Instalar dependências novas (só se requirements.txt mudou)
            .venv/bin/pip install -r requirements.txt -q

            # Restart via docker nsenter (sem sudo/su)
            docker run --rm --privileged --pid=host \
              -v /run/systemd:/run/systemd \
              -v /var/run/dbus:/var/run/dbus \
              alpine sh -c 'nsenter --mount=/proc/1/ns/mnt -- systemctl restart vdx-render'

            sleep 6

            # Health check
            curl -sf http://localhost:8001/health || exit 1
            echo "Render API OK"
