name: Deploy Render API

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate syntax
        run: python -m py_compile app/main.py

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy app/
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            app/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/vdx-render-api/app/

      - name: Deploy requirements.txt
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT }} \
            requirements.txt \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/vdx-render-api/

      - name: Install deps + restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/vdx-render-api && \
             .venv/bin/pip install -r requirements.txt -q && \
             docker run --rm --privileged --pid=host \
               -v /run/systemd:/run/systemd -v /var/run/dbus:/var/run/dbus \
               alpine sh -c 'nsenter --mount=/proc/1/ns/mnt -- systemctl restart vdx-render' && \
             sleep 5 && \
             curl -sf http://localhost:8001/health && \
             echo 'Deploy OK'"
